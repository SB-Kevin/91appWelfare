<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏓 2026 匹克球大賽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@700&display=swap');
  :root {
    --bg:#0a0e1a; --surface:#131929; --surface2:#1c2540; --border:#2a3558;
    --black-team:#94a3b8; --black-accent:#475569;
    --white-team:#60a5fa; --white-accent:#3b82f6;
    --host:#a78bfa; --host-accent:#7c3aed;
    --audience:#34d399; --audience-accent:#059669;
    --text:#e2e8f0; --muted:#64748b;
    --success:#22c55e; --warn:#f59e0b; --danger:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* LOGIN */
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .login-title{font-family:'Oswald',sans-serif;font-size:2rem;letter-spacing:.1em;margin-bottom:4px;color:#fff;}
  .login-sub{color:var(--muted);font-size:.85rem;margin-bottom:32px;}
  .role-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;}
  .role-card{border-radius:12px;padding:16px 20px;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:14px;}
  .role-card:hover{transform:translateY(-2px);}
  .role-card.black{background:var(--surface2);border-color:var(--black-accent);}
  .role-card.white{background:#0f1e3a;border-color:var(--white-accent);}
  .role-card.host{background:#130f2a;border-color:var(--host-accent);}
  .role-card.audience{background:#061a12;border-color:var(--audience-accent);}
  .role-icon{font-size:1.8rem;}
  .role-info h3{font-weight:700;font-size:1rem;}
  .role-info p{font-size:.75rem;color:var(--muted);}
  .role-card.black .role-info h3{color:var(--black-team);}
  .role-card.white .role-info h3{color:var(--white-team);}
  .role-card.host  .role-info h3{color:var(--host);}
  .role-card.audience .role-info h3{color:var(--audience);}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:var(--surface);border-radius:16px;padding:28px;width:300px;border:1px solid var(--border);}
  .modal h3{margin-bottom:14px;font-size:1.1rem;}
  .modal input{width:100%;background:var(--bg);border:1.5px solid var(--border);color:#fff;padding:10px 14px;border-radius:8px;font-size:1rem;letter-spacing:.2em;margin-bottom:10px;outline:none;}
  .modal input:focus{border-color:var(--white-accent);}
  .modal-btns{display:flex;gap:8px;}
  .btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.85rem;transition:opacity .15s;}
  .btn:hover{opacity:.85;}
  .btn-primary{background:var(--white-accent);color:#fff;}
  .btn-secondary{background:var(--surface2);color:var(--muted);}
  .btn-danger{background:var(--danger);color:#fff;}
  .error-msg{color:var(--danger);font-size:.78rem;margin-bottom:8px;min-height:18px;}

  /* APP */
  #app-screen{display:none;min-height:100vh;}
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .app-header-title{font-family:'Oswald',sans-serif;font-size:1.1rem;letter-spacing:.08em;}
  .role-tag{font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:700;}
  .tag-black{background:var(--black-accent);color:#e2e8f0;}
  .tag-white{background:var(--white-accent);color:#fff;}
  .tag-host{background:var(--host-accent);color:#fff;}
  .tag-audience{background:var(--audience-accent);color:#fff;}
  .header-right{display:flex;align-items:center;gap:10px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--success);}
  .sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
  .sync-dot.error{background:var(--danger);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .logout-btn{font-size:.75rem;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px;}
  .logout-btn:hover{color:var(--text);}
  .app-body{padding:16px;max-width:600px;margin:0 auto;}
  .section-title{font-size:.7rem;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}

  /* POINT CARD */
  .point-card{background:var(--surface);border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid var(--border);}
  .point-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .point-header-left h4{font-size:.95rem;font-weight:700;}
  .point-header-left span{font-size:.72rem;color:var(--muted);}
  .point-status{font-size:.7rem;padding:3px 9px;border-radius:10px;font-weight:700;}
  .status-open{background:#1a2a1a;color:var(--success);}
  .status-locked{background:#2a1a1a;color:var(--danger);}
  .point-body{padding:14px;}
  .selected-players{display:flex;gap:8px;flex-wrap:wrap;min-height:40px;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:10px;border:1px dashed var(--border);align-items:center;}
  .selected-tag{display:flex;align-items:center;gap:5px;background:var(--surface2);border-radius:16px;padding:4px 10px;font-size:.8rem;}
  .selected-tag .rm{color:var(--danger);cursor:pointer;font-weight:900;margin-left:2px;}
  .player-grid{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
  .player-chip{padding:5px 11px;border-radius:20px;font-size:.8rem;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);transition:all .15s;display:flex;align-items:center;gap:5px;}
  .player-chip:hover{border-color:var(--muted);}
  .chip-sel-b{border-color:var(--black-team)!important;background:#1a2235!important;color:var(--black-team);}
  .chip-sel-w{border-color:var(--white-accent)!important;background:#0f1e3a!important;color:var(--white-team);}
  .gender-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .gm{background:#3b82f6;}.gf{background:#ec4899;}
  .lock-btn{width:100%;padding:10px;border-radius:8px;border:none;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;}
  .lock-btn-b{background:var(--black-accent);color:#fff;}
  .lock-btn-w{background:var(--white-accent);color:#fff;}
  .locked-display{padding:12px;background:var(--bg);border-radius:8px;text-align:center;}
  .locked-names{color:var(--text);font-weight:700;font-size:1rem;margin-top:4px;}

  /* HOST */
  .host-point-card{background:var(--surface);border-radius:12px;margin-bottom:14px;border:1px solid var(--border);overflow:hidden;}
  .host-point-header{padding:10px 16px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
  .host-point-header h4{font-size:.95rem;font-weight:700;}
  .host-point-body{padding:14px;}
  .vs-row{display:grid;grid-template-columns:1fr 44px 1fr;gap:8px;align-items:center;margin-bottom:12px;}
  .team-col{background:var(--bg);border-radius:8px;padding:10px;text-align:center;min-height:54px;display:flex;flex-direction:column;justify-content:center;}
  .team-col-label{font-size:.65rem;color:var(--muted);margin-bottom:4px;font-weight:700;letter-spacing:.05em;}
  .team-col-names{font-size:.88rem;font-weight:700;line-height:1.4;}
  .waiting-text{font-size:.75rem;color:var(--muted);font-style:italic;}
  .vs-badge{text-align:center;font-weight:900;color:var(--border);font-size:.9rem;}
  .publish-btn{width:100%;padding:10px;border-radius:8px;border:none;font-weight:700;font-size:.9rem;cursor:pointer;background:var(--host-accent);color:#fff;transition:opacity .2s;}
  .publish-btn:hover:not(:disabled){opacity:.85;}
  .publish-btn:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
  .revealed-banner{background:#130f2a;border-radius:8px;padding:10px 14px;text-align:center;border:1px solid var(--host-accent);margin-bottom:10px;}
  .revealed-vs{font-size:.95rem;font-weight:700;color:var(--host);}
  .score-section{display:grid;grid-template-columns:1fr 30px 1fr;gap:10px;align-items:center;}
  .score-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .score-label{font-size:.65rem;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:4px;}
  .score-val{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;}
  .sv-b{color:var(--black-team);}.sv-w{color:var(--white-team);}
  .score-btns{display:flex;gap:6px;}
  .sc-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-weight:900;font-size:.9rem;}
  .sc-minus{background:var(--surface2);color:var(--muted);}
  .sc-plus-b{background:var(--black-accent);color:#fff;}
  .sc-plus-w{background:var(--white-accent);color:#fff;}
  .sc-colon{text-align:center;font-size:1.3rem;color:var(--border);font-weight:900;}
  .win-tag{background:#14532d;color:var(--success);font-size:.62rem;padding:2px 6px;border-radius:8px;font-weight:700;}
  .ls-badge{font-size:.65rem;padding:2px 7px;border-radius:8px;font-weight:700;}
  .ls-ok{background:#1a3a1a;color:var(--success);}
  .ls-wait{background:#2a2a1a;color:var(--warn);}
  .lock-status-row{display:flex;gap:6px;align-items:center;}

  /* SCOREBOARD */
  .total-board{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:12px;display:flex;justify-content:center;align-items:center;gap:24px;border:1px solid var(--border);}
  .total-col{text-align:center;}
  .total-col-label{font-size:.7rem;color:var(--muted);margin-bottom:4px;}
  .total-col-num{font-family:'Oswald',sans-serif;font-size:3rem;font-weight:700;}
  .total-b{color:var(--black-team);}.total-w{color:var(--white-team);}
  .total-vs{font-size:1.5rem;color:var(--border);font-weight:900;}
  .champion-text{text-align:center;font-size:1rem;font-weight:700;color:var(--warn);min-height:26px;margin-bottom:10px;}

  /* AUDIENCE */
  .audience-point{background:var(--surface);border-radius:12px;margin-bottom:12px;border:1px solid var(--border);overflow:hidden;}
  .audience-point-header{padding:10px 14px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
  .audience-point-body{padding:14px;}
  .audience-vs{display:grid;grid-template-columns:1fr 30px 1fr;gap:8px;align-items:center;margin-bottom:10px;}
  .audience-team{text-align:center;background:var(--bg);border-radius:8px;padding:10px;}
  .audience-names{font-weight:700;font-size:.9rem;line-height:1.5;}
  .audience-score{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;}
  .hidden-banner{padding:12px;text-align:center;color:var(--muted);font-size:.85rem;font-style:italic;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-title">🏓 2026 匹克球大賽</div>
  <div class="login-sub">選擇角色進入</div>
  <div class="role-cards">
    <div class="role-card black" onclick="selectRole('black')">
      <div class="role-icon">⚫</div>
      <div class="role-info"><h3>黑隊隊長</h3><p>秘密填入每點出場名單</p></div>
    </div>
    <div class="role-card white" onclick="selectRole('white')">
      <div class="role-icon">⚪</div>
      <div class="role-info"><h3>白隊隊長</h3><p>秘密填入每點出場名單</p></div>
    </div>
    <div class="role-card host" onclick="selectRole('host')">
      <div class="role-icon">🎙️</div>
      <div class="role-info"><h3>主持人</h3><p>公布名單、記錄比分</p></div>
    </div>
    <div class="role-card audience" onclick="selectRole('audience')">
      <div class="role-icon">👀</div>
      <div class="role-info"><h3>觀眾模式</h3><p>即時觀看比分與已公布名單</p></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="pin-modal" style="display:none">
  <div class="modal">
    <h3 id="pin-title">輸入密碼</h3>
    <div class="error-msg" id="pin-error"></div>
    <input type="password" id="pin-input" placeholder="密碼" autocomplete="off"
      onkeydown="if(event.key==='Enter')submitPin()">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="submitPin()">進入</button>
      <button class="btn btn-secondary" onclick="closePin()">取消</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="app-header-title">🏓 盲填排點</span>
      <span class="role-tag" id="role-tag"></span>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot" title="同步狀態"></div>
      <span class="logout-btn" onclick="logout()">登出</span>
    </div>
  </div>
  <div class="app-body" id="app-body"></div>
</div>

<script>
const PASSWORDS = {black:'A1234', white:'B9876', host:null, audience:null};
const POLL_MS = 4000;
const STORAGE_KEY = 'pickleball-2026-data';

const BLACK_MEMBERS = [
  {name:'Luke',g:'M'},{name:'Kevin',g:'M'},{name:'Wade',g:'M'},
  {name:'Ivan',g:'M'},{name:'Wen',g:'M'},
  {name:'Penny Chiu',g:'F'},{name:'Jessie',g:'F'},{name:'Ruby',g:'F'},
  {name:'Patty',g:'F'},{name:'Sylvia',g:'F'},{name:'Lisa',g:'F'},{name:'Fangyu',g:'F'}
];
const WHITE_MEMBERS = [
  {name:'Andy',g:'M'},{name:'Yo',g:'M'},{name:'Jacky',g:'M'},
  {name:'Pierce',g:'M'},{name:'Hendrix',g:'M'},
  {name:'Naiyu',g:'F'},{name:'Penny Liao',g:'F'},{name:'Lucy',g:'F'},
  {name:'Fanny',g:'F'},{name:'Sammi',g:'F'},{name:'Wendy',g:'F'},{name:'Lele',g:'F'}
];
const POINT_DEFS = [
  {label:'第一點',type:'男雙',req:'MM'},
  {label:'第二點',type:'女雙',req:'FF'},
  {label:'第三點',type:'混雙',req:'MF'},
  {label:'第四點',type:'混雙',req:'MF'},
  {label:'第五點',type:'自由點',req:'free'},
  {label:'第六點',type:'自由點',req:'free'},
];

let currentRole=null, pendingRole=null, pollTimer=null;
let localSel=Array.from({length:6},()=>[]);

function defaultData(){
  return {
    black:Array.from({length:6},()=>({locked:false,players:[]})),
    white:Array.from({length:6},()=>({locked:false,players:[]})),
    revealed:Array(6).fill(false),
    scores:Array.from({length:6},()=>({black:0,white:0}))
  };
}

// ---- STORAGE ----
function setSyncStatus(s){
  const d=document.getElementById('sync-dot');
  if(!d)return;
  d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
}

async function loadData(){
  setSyncStatus('syncing');
  try{
    let result=null;
    if(window.storage){
      result=await window.storage.get(STORAGE_KEY,true);
    }
    setSyncStatus('ok');
    if(!result||!result.value)return defaultData();
    try{
      const d=JSON.parse(result.value);
      const def=defaultData();
      if(!d.black||d.black.length!==6)d.black=def.black;
      if(!d.white||d.white.length!==6)d.white=def.white;
      if(!d.revealed||d.revealed.length!==6)d.revealed=def.revealed;
      if(!d.scores||d.scores.length!==6)d.scores=def.scores;
      return d;
    }catch(e){return defaultData();}
  }catch(e){
    // key not found or storage unavailable — return defaults
    setSyncStatus('ok');
    return defaultData();
  }
}

async function saveData(data){
  setSyncStatus('syncing');
  try{
    if(window.storage){
      await window.storage.set(STORAGE_KEY,JSON.stringify(data),true);
    }
    setSyncStatus('ok');
  }catch(e){setSyncStatus('error');}
}

// ---- LOGIN ----
function selectRole(role){
  if(PASSWORDS[role]===null){enterApp(role);return;}
  pendingRole=role;
  document.getElementById('pin-title').textContent=role==='black'?'⚫ 黑隊密碼':'⚪ 白隊密碼';
  document.getElementById('pin-error').textContent='';
  document.getElementById('pin-input').value='';
  document.getElementById('pin-modal').style.display='flex';
  setTimeout(()=>document.getElementById('pin-input').focus(),100);
}
function submitPin(){
  const val=document.getElementById('pin-input').value;
  if(val===PASSWORDS[pendingRole]){closePin();enterApp(pendingRole);}
  else{document.getElementById('pin-error').textContent='密碼錯誤';document.getElementById('pin-input').value='';}
}
function closePin(){document.getElementById('pin-modal').style.display='none';pendingRole=null;}

function enterApp(role){
  currentRole=role;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  const tagEl=document.getElementById('role-tag');
  const labels={black:'⚫ 黑隊',white:'⚪ 白隊',host:'🎙️ 主持人',audience:'👀 觀眾'};
  const classes={black:'tag-black',white:'tag-white',host:'tag-host',audience:'tag-audience'};
  tagEl.textContent=labels[role];tagEl.className='role-tag '+classes[role];
  localSel=Array.from({length:6},()=>[]);
  startPolling();renderApp();
}
function logout(){
  stopPolling();currentRole=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
}
function startPolling(){
  stopPolling();
  pollTimer=setInterval(()=>renderApp(),POLL_MS);
}
function stopPolling(){if(pollTimer)clearInterval(pollTimer);}

async function renderApp(){
  if(currentRole==='host')await renderHost();
  else if(currentRole==='audience')await renderAudience();
  else await renderTeamFill();
}

// ---- TEAM FILL ----
async function renderTeamFill(){
  const data=await loadData();
  const team=currentRole;
  const members=team==='black'?BLACK_MEMBERS:WHITE_MEMBERS;
  const chipSel=team==='black'?'chip-sel-b':'chip-sel-w';
  const lockClass=team==='black'?'lock-btn-b':'lock-btn-w';
  let html=`<div class="section-title">秘密填入每點出場名單</div>`;
  POINT_DEFS.forEach((pd,i)=>{
    const slot=data[team][i];
    const sel=localSel[i];
    const locked=slot.locked;
    html+=`<div class="point-card">
      <div class="point-header">
        <div class="point-header-left"><h4>${pd.label}</h4><span>${pd.type}</span></div>
        ${locked?'<span class="point-status status-locked">已鎖定 🔒</span>':'<span class="point-status status-open">填寫中</span>'}
      </div><div class="point-body">`;
    if(locked){
      html+=`<div class="locked-display">
        <div style="color:var(--success);font-size:.8rem">✅ 已鎖定送出</div>
        <div class="locked-names">${slot.players.map(p=>p.name).join(' ＆ ')}</div>
      </div>`;
    }else{
      html+=`<div class="selected-players">`;
      if(!sel.length)html+=`<span style="color:var(--muted);font-size:.8rem">點選下方隊員（需選 2 位）</span>`;
      else sel.forEach(p=>{
        html+=`<span class="selected-tag"><span class="gender-dot ${p.g==='M'?'gm':'gf'}"></span>${p.name}<span class="rm" onclick="removePlayer(${i},'${p.name}')">✕</span></span>`;
      });
      html+=`</div><div class="player-grid">`;
      members.forEach(m=>{
        const isSel=sel.find(p=>p.name===m.name);
        html+=`<div class="player-chip${isSel?' '+chipSel:''}" onclick="togglePlayer(${i},'${m.name}','${m.g}')">
          <span class="gender-dot ${m.g==='M'?'gm':'gf'}"></span>${m.name}</div>`;
      });
      html+=`</div>`;
      const canLock=sel.length===2;
      html+=`<button class="lock-btn ${lockClass}" onclick="lockPoint(${i})"
        ${canLock?'':'disabled'} style="${canLock?'':'opacity:.4;cursor:not-allowed'}">
        ${canLock?'🔒 鎖定送出':'已選 '+sel.length+'/2 位'}</button>`;
    }
    html+=`</div></div>`;
  });
  document.getElementById('app-body').innerHTML=html;
}

function togglePlayer(pi,name,g){
  const sel=localSel[pi];
  const idx=sel.findIndex(p=>p.name===name);
  if(idx>=0){sel.splice(idx,1);renderTeamFill();return;}
  if(sel.length>=2)return;
  const req=POINT_DEFS[pi].req;
  if(req==='MM'&&g!=='M'){alert('此點為男雙，只能選男性！');return;}
  if(req==='FF'&&g!=='F'){alert('此點為女雙，只能選女性！');return;}
  if(req==='MF'){
    const ms=sel.filter(p=>p.g==='M').length;
    const fs=sel.filter(p=>p.g==='F').length;
    if(g==='M'&&ms>=1){alert('混雙已有男性！');return;}
    if(g==='F'&&fs>=1){alert('混雙已有女性！');return;}
  }
  sel.push({name,g});renderTeamFill();
}
function removePlayer(pi,name){localSel[pi]=localSel[pi].filter(p=>p.name!==name);renderTeamFill();}
async function lockPoint(pi){
  if(localSel[pi].length!==2)return;
  const data=await loadData();
  data[currentRole][pi]={locked:true,players:[...localSel[pi]]};
  await saveData(data);
  localSel[pi]=[];renderTeamFill();
}

// ---- HOST ----
async function renderHost(){
  const data=await loadData();
  let bt=0,wt=0;
  data.scores.forEach(s=>{if(s.black===11)bt++;if(s.white===11)wt++;});
  let champText='';
  const done=bt+wt===6||bt>=4||wt>=4;
  if(done){
    if(bt>wt)champText='🏆 黑隊獲勝！';
    else if(wt>bt)champText='🏆 白隊獲勝！';
    else champText='⚡ 3:3 平手！加賽混雙驟死賽！';
  }
  let html=`
  <div class="total-board">
    <div class="total-col"><div class="total-col-label">⚫ 黑隊</div><div class="total-col-num total-b">${bt}</div></div>
    <div class="total-vs">:</div>
    <div class="total-col"><div class="total-col-label">⚪ 白隊</div><div class="total-col-num total-w">${wt}</div></div>
  </div>
  <div class="champion-text">${champText}</div>
  <div class="section-title">各點管理</div>`;
  POINT_DEFS.forEach((pd,i)=>{
    const bSlot=data.black[i],wSlot=data.white[i];
    const revealed=data.revealed[i];
    const bs=data.scores[i].black,ws=data.scores[i].white;
    const bWin=bs===11,wWin=ws===11;
    const bothLocked=bSlot.locked&&wSlot.locked;
    html+=`<div class="host-point-card">
      <div class="host-point-header">
        <h4>${pd.label} <span style="font-size:.75rem;color:var(--muted);font-weight:400">${pd.type}</span></h4>
        <div class="lock-status-row">
          <span class="ls-badge ${bSlot.locked?'ls-ok':'ls-wait'}">黑${bSlot.locked?'✓':'…'}</span>
          <span class="ls-badge ${wSlot.locked?'ls-ok':'ls-wait'}">白${wSlot.locked?'✓':'…'}</span>
        </div>
      </div><div class="host-point-body">`;
    if(revealed){
      html+=`<div class="revealed-banner">
        <div class="revealed-vs">⚫ ${bSlot.players.map(p=>p.name).join(' ＆ ')} &nbsp;vs&nbsp; ${wSlot.players.map(p=>p.name).join(' ＆ ')} ⚪</div>
      </div>
      <div class="score-section">
        <div class="score-col">
          <div class="score-label">⚫ 黑隊 ${bWin?'<span class="win-tag">勝</span>':''}</div>
          <div class="score-val sv-b">${bs}</div>
          <div class="score-btns">
            <button class="sc-btn sc-minus" onclick="adjScore(${i},'black',-1)">−</button>
            <button class="sc-btn sc-plus-b" onclick="adjScore(${i},'black',1)">+</button>
          </div>
        </div>
        <div class="sc-colon">:</div>
        <div class="score-col">
          <div class="score-label">⚪ 白隊 ${wWin?'<span class="win-tag">勝</span>':''}</div>
          <div class="score-val sv-w">${ws}</div>
          <div class="score-btns">
            <button class="sc-btn sc-minus" onclick="adjScore(${i},'white',-1)">−</button>
            <button class="sc-btn sc-plus-w" onclick="adjScore(${i},'white',1)">+</button>
          </div>
        </div>
      </div>`;
    }else{
      html+=`<div class="vs-row">
        <div class="team-col">
          <div class="team-col-label">⚫ 黑隊</div>
          <div class="team-col-names">${bSlot.locked?'🔒 已鎖定':'<span class="waiting-text">等待填寫…</span>'}</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-col">
          <div class="team-col-label">⚪ 白隊</div>
          <div class="team-col-names">${wSlot.locked?'🔒 已鎖定':'<span class="waiting-text">等待填寫…</span>'}</div>
        </div>
      </div>
      <button class="publish-btn" onclick="revealPoint(${i})" ${bothLocked?'':'disabled'}>
        ${bothLocked?'📢 公布名單':'等待雙方鎖定…'}</button>`;
    }
    html+=`</div></div>`;
  });
  html+=`<div style="height:8px"></div>
  <button class="btn btn-danger" style="width:100%;padding:12px" onclick="resetAll()">🔄 重設所有資料</button>
  <div style="height:24px"></div>`;
  document.getElementById('app-body').innerHTML=html;
}

async function revealPoint(pi){
  const data=await loadData();
  data.revealed[pi]=true;
  await saveData(data);renderHost();
}
async function adjScore(pi,team,delta){
  const data=await loadData();
  data.scores[pi][team]=Math.max(0,Math.min(11,data.scores[pi][team]+delta));
  await saveData(data);renderHost();
}
async function resetAll(){
  if(!confirm('確定要重設所有資料？'))return;
  await saveData(defaultData());
  localSel=Array.from({length:6},()=>[]);renderApp();
}

      </div>`;
    }else{
      html+=`<div class="hidden-banner">⏳ 等待主持人公布…</div>`;

  html+=`<div style="height:24px"></div>`;
  document.getElementById('app-body').innerHTML=html;
